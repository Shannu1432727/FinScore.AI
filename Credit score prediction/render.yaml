services:
  - type: web
    name: finscore-ai
    runtime: docker
    healthCheckPath: /healthz
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: finscore-db
          property: connectionString
      - key: APP_BASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USE_TLS
        value: "true"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: UPLOAD_FOLDER
        value: /tmp/uploads
      - key: REPORT_FOLDER
        value: /var/data/reports
    disk:
      name: report-storage
      mountPath: /var/data
      sizeGB: 1

databases:
  - name: finscore-db
    databaseName: finscore
    user: finscore

