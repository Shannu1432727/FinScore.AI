<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify sign-in code — FinScore AI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
</head>
<body>
  <div class="container py-5 mt-5">
    <div class="row justify-content-center"><div class="col-md-6"><div class="glass-card p-4 p-md-5 text-center">
      {% include '_flash_toasts.html' %}
      <i class="fa-solid fa-shield-halved fa-2x mb-3"></i>
      <h2>Enter your sign-in code</h2>
      <p class="text-muted">We sent a six-digit code to <strong>{{ masked_email }}</strong>.</p>
      <form method="post" action="{{ url_for('verify_login_otp') }}">
        <input class="form-control fin-input text-center mb-3" name="otp" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code" aria-label="Six-digit sign-in code" required autofocus />
        <button class="btn btn-glow btn-lg w-100" type="submit">Verify and sign in</button>
      </form>
      <p class="text-muted mt-3 mb-1" style="font-size:13px">Code expires in 60 seconds · {{ attempts_left }} attempts remaining</p>
      <form method="post" action="{{ url_for('login') }}" class="mt-3"><input type="hidden" name="email" value="{{ session.get('pending_login_email', '') }}" /><button class="btn btn-outline-light" type="submit">Resend code</button></form>
      <a class="d-inline-block mt-3" href="{{ url_for('login') }}">Use a different email</a>
    </div></div></div>
  </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
