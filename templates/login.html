<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — FinScore AI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
</head>
<body>
  <div class="container py-5 mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="glass-card p-4 p-md-5">
          {% include '_flash_toasts.html' %}
          <div class="text-center">
            <i class="fa-solid fa-envelope-circle-check fa-2x mb-3"></i>
            <h2 class="mb-3">Sign in with email</h2>
            <p class="text-muted mb-4">Enter your email and we’ll send a secure six-digit sign-in code.</p>
          </div>
          <form method="post" action="{{ url_for('login') }}">
            <label class="form-label" for="email">Email address</label>
            <input class="form-control fin-input mb-3" id="email" name="email" type="email" autocomplete="email" maxlength="254" required autofocus />
            <button class="btn btn-glow btn-lg w-100" type="submit">
              <i class="fa-solid fa-paper-plane me-2"></i>Send sign-in code
            </button>
          </form>
          <p class="text-muted text-center mt-3 mb-0" style="font-size:13px">Codes expire after 60 seconds. New accounts are created after verification.</p>
          <div class="mt-4 text-center"><a href="/" class="btn btn-outline-light">Back to home</a></div>
        </div>
      </div>
    </div>
  </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
