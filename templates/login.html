<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — FinScore AI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
</head>
<body>
  <div class="container py-5 mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="glass-card p-4 p-md-5 text-center">
          <h2 class="mb-3">Sign in to continue</h2>
          <p class="text-muted mb-4">You must sign in with Google before generating a credit report.</p>
          <a href="/auth/google" class="btn btn-glow btn-lg w-100" id="googleSignInBtn" onclick="handleGoogleSignIn(event)">
            <i class="fa-brands fa-google me-2" id="googleBtnIcon"></i>
            <span id="googleBtnText">Sign in with Google</span>
          </a>
          <div id="signingInMsg" class="mt-3 text-muted d-none" style="font-size:14px">
            <span class="spinner-border spinner-border-sm me-2" role="status"></span>
            Signing you in with Google...
          </div>
          <div class="mt-4">
            <a href="/" class="btn btn-outline-light">Back to home</a>
          </div>
        </div>
      </div>
    </div>
  </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
let _signingIn = false;
function handleGoogleSignIn(e) {
  if (_signingIn) { e.preventDefault(); return; }
  _signingIn = true;
  const btn  = document.getElementById('googleSignInBtn');
  const icon = document.getElementById('googleBtnIcon');
  const text = document.getElementById('googleBtnText');
  const msg  = document.getElementById('signingInMsg');
  btn.classList.add('disabled');
  btn.style.pointerEvents = 'none';
  icon.className = 'spinner-border spinner-border-sm me-2';
  text.textContent = 'Redirecting to Google...';
  msg.classList.remove('d-none');
  // Safety reset after 15s in case redirect fails
  setTimeout(() => {
    _signingIn = false;
    btn.classList.remove('disabled');
    btn.style.pointerEvents = '';
    icon.className = 'fa-brands fa-google me-2';
    text.textContent = 'Sign in with Google';
    msg.classList.add('d-none');
  }, 15000);
}
</script>
</body>
</html>
