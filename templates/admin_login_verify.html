<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enter Admin OTP — FinScore AI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #07111f, #13253f 60%, #0f172a);
      color: #f8fafc;
    }
    .login-card {
      width: min(95vw, 440px);
      background: rgba(20, 29, 45, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 20px;
      box-shadow: 0 20px 45px rgba(2, 8, 23, 0.35);
      padding: 2rem;
    }
    .brand-logo { font-size: 1.4rem; font-weight: 800; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="brand-logo mb-2"><i class="fa-solid fa-landmark me-2"></i>FinScore<span style="color:#60a5fa">AI</span></div>
      <h3 class="mb-1">Admin OTP Verification</h3>
      <p class="text-muted mb-0">Enter the code sent to the admin email.</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} py-2 mb-3">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('admin_login_verify', username=username) }}">
      <div class="mb-3">
        <label class="form-label">OTP Code</label>
        <input type="text" class="form-control" name="otp" placeholder="Enter 6-digit OTP" minlength="6" maxlength="6" required autofocus />
      </div>
      <button type="submit" class="btn btn-glow w-100">Verify OTP</button>
    </form>

    <div class="mt-3 text-center">
      <a href="{{ url_for('admin_login') }}" class="text-info">Back to login</a>
    </div>
  </div>
</body>
</html>
